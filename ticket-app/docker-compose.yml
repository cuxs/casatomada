services:
  db:
    image: postgres:16-alpine
    container_name: ticket-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ticketapp
      POSTGRES_PASSWORD: ticketapp
      POSTGRES_DB: ticketapp
    ports:
      - "5433:5432"
    volumes:
      - ticket-app-db-data:/var/lib/postgresql/data

volumes:
  ticket-app-db-data:
